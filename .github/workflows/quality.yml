name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      # `npm run quality` invokes `vitest run`, whose default discovery runs
      # every *.test.ts file, including the mocked browser-injection coverage
      # in src/lib/background.test.ts.
      - name: Run quality gate and mocked browser tests
        run: npm run quality
