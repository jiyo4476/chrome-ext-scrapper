<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker Capture Settings</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Job Tracker Capture</h1>
      </header>
      <section id="status" role="status"></section>
      <form id="settings-form">
        <section class="settings-section">
          <label>
            Job Tracker URL
            <input id="api-base-url" name="apiBaseUrl" type="url" required />
          </label>
          <button id="oauth-sign-in" type="button">
            Sign in with Authentik
          </button>
          <button id="test-connection" type="button">Test Connection</button>
        </section>

        <label class="row">
          <input id="auto-detect" name="autoDetect" type="checkbox" />
          Auto-detect likely job pages
        </label>
        <button type="submit">Save</button>
      </form>
    </main>
  </body>
</html>
