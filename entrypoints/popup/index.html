<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker Capture</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Job Tracker Capture</h1>
        <a href="/options.html" target="_blank" rel="noreferrer">Settings</a>
      </header>

      <section id="status" role="status">Ready to scan the active tab.</section>

      <form id="job-form">
        <label>
          Title
          <input id="job-title" name="job_title" autocomplete="off" />
        </label>
        <label>
          Company
          <input
            id="company-name"
            name="company_name"
            autocomplete="organization"
          />
        </label>
        <label>
          Link
          <input id="job-link" name="job_link" type="url" autocomplete="url" />
        </label>
        <label>
          Platform
          <input
            id="source-platform"
            name="source_platform"
            autocomplete="off"
          />
        </label>
        <label>
          Description
          <textarea
            id="job-description"
            name="job_description"
            rows="5"
          ></textarea>
        </label>
      </form>

      <footer>
        <button id="extract-button" type="button">Extract</button>
        <button id="save-button" type="button" disabled>Save Job</button>
      </footer>
    </main>
  </body>
</html>
